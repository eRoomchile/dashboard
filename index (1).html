html, body {
  min-height: 100vh; background: #0e0b14;
  font-family: Arial, sans-serif;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; overflow-x: hidden;
}
.wrap {
  position: relative; width: 100%; max-width: 420px;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0; z-index: 1;
}
.glow {
  position: absolute; width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, rgba(147,51,234,0.3) 0%, transparent 70%);
  top: 160px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 0;
}
.orbit-wrap { position: relative; width: 320px; height: 320px; flex-shrink: 0; }
.logo-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 10; }
.logo-ring {
  width: 110px; height: 110px; border-radius: 50%;
  background: linear-gradient(135deg,#9333ea,#e663f7);
  display: flex; align-items: center; justify-content: center;
  animation: logopulse 2.5s ease-in-out infinite;
}
.logo-inner {
  width: 98px; height: 98px; border-radius: 50%; background: #fff;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.logo-img { width: 70px; height: 70px; object-fit: contain; }
@keyframes logopulse {
  0%,100% { box-shadow: 0 0 40px rgba(147,51,234,0.7); }
  50%      { box-shadow: 0 0 70px rgba(147,51,234,1), 0 0 120px rgba(147,51,234,0.4); }
}
.ocard {
  position: absolute; width: 80px;
  background: #fff; border: 1.5px solid rgba(147,51,234,0.6);
  border-radius: 10px; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  will-change: transform; cursor: pointer; overflow: hidden;
}
.ocard-img  { width:100%; height:62px; object-fit:contain; background:#f8f5ff; display:block; }
.ocard-noimg{ width:100%; height:62px; background:#f8f5ff; display:flex; align-items:center; justify-content:center; font-size:22px; }
.ocard-label{ font-size:6.5px; font-weight:700; color:#6b21a8; text-align:center; padding:3px 2px; width:100%; background:#faf5ff; line-height:1.2; }
.brand-logo { margin-top: 14px; margin-bottom: 12px; }
.info-box { background:rgba(26,20,37,0.85); border-radius:14px; padding:14px 18px; margin-bottom:16px; border:1px solid rgba(147,51,234,0.3); width:100%; }
.info-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:14px; color:#fff; font-weight:600; }
.info-row:last-child { margin-bottom:0; }
.guide-box { display:flex; justify-content:space-between; align-items:center; width:100%; margin-bottom:16px; padding:12px 16px; background:rgba(147,51,234,0.15); border-radius:12px; border:1px solid rgba(147,51,234,0.3); }
.guide-step { text-align:center; flex:1; }
.guide-step-icon { font-size:18px; margin-bottom:4px; }
.guide-step-text { font-size:9px; color:#c4a8d4; font-weight:700; line-height:1.3; }
.guide-arrow { color:#9333ea; font-size:14px; }
.pointer-anim {
  text-align: center;
  font-size: 28px;
  animation: bounce 0.8s ease-in-out infinite;
  margin-bottom: 6px;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
.btn { display:block; width:100%; padding:18px; background:linear-gradient(135deg,#9333ea,#e663f7); color:#fff; border:none; border-radius:14px; font-size:17px; font-weight:700; cursor:pointer; animation:btnpulse 2s ease-in-out infinite; }
@keyframes btnpulse { 0%,100%{box-shadow:0 8px 24px rgba(147,51,234,0.4);}50%{box-shadow:0 8px 40px rgba(147,51,234,0.8);} }
.btn.loading { background:#6b21a8; animation:none; cursor:not-allowed; }
.footer { margin-top:14px; font-size:11px; color:#8b6fa0; }
.overlay { display:none; position:fixed; inset:0; background:rgba(14,11,20,0.9); z-index:99; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
.overlay.on { display:flex; }
.spinner { width:50px; height:50px; border:4px solid rgba(147,51,234,0.2); border-top-color:#e663f7; border-radius:50%; animation:spinspin 0.8s linear infinite; }
@keyframes spinspin { to{transform:rotate(360deg)} }
.loading-txt { color:#c4a8d4; font-size:14px; }
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="loading-txt">Cargando catálogo...</div>
</div>
<div class="bg-bp"></div>
<div class="wrap">
  <div class="glow"></div>
  <div class="orbit-wrap" id="orbitWrap">
    <div class="logo-center">
      <div class="logo-ring"><div class="logo-inner">
        <img class="logo-img" id="logoImg" src="" />
      </div></div>
    </div>
  </div>
  <div class="brand-logo">
    <img id="logo2Img" src="" style="height:90px;object-fit:contain;background:transparent;" />
  </div>
  <div class="info-box">
    <div class="info-row"><span>📍</span><span>Franklin 543, Santiago, Chile</span></div>
    <div class="info-row"><span>📞</span><span>+569 3437 6361 | +569 3437 6368</span></div>
    <div class="info-row"><span>🕐</span><span>Lun-Vie 9:00-17:30 | Sáb 10:00-15:30</span></div>
  </div>
  <div class="guide-box">
    <div class="guide-step"><div class="guide-step-icon">🛒</div><div class="guide-step-text">Seleccione<br>productos</div></div>
    <div class="guide-arrow">→</div>
    <div class="guide-step"><div class="guide-step-icon">📋</div><div class="guide-step-text">Complete<br>sus datos</div></div>
    <div class="guide-arrow">→</div>
    <div class="guide-step"><div class="guide-step-icon">📲</div><div class="guide-step-text">Envíe por<br>WhatsApp</div></div>
  </div>
  <div class="pointer-anim">👇</div>
  <button class="btn" id="catBtn" onclick="gocat()">🛒 Ver Catálogo →</button>
  <p class="footer">EROOM — Catálogo de Productos</p>
</div>
<script>
var logoSrc  = '__LOGO_BASE64__';
var logo2Src = '__LOGO2_BASE64__';
var CARDS    = __CARDS_JSON__;
var CAT_URL  = '__CAT_URL__';

if (logoSrc && logoSrc.length > 10) {
  document.getElementById('logoImg').src = logoSrc;
} else {
  document.getElementById('logoImg').outerHTML = '<span style="font-size:22px;font-weight:700;color:#9333ea;">E</span>';
}

if (logo2Src && logo2Src.length > 10) {
  document.getElementById('logo2Img').src = logo2Src;
} else {
  document.getElementById('logo2Img').outerHTML = '<span style="font-size:26px;font-weight:700;color:#fff;">eRoom</span>';
}

var total=CARDS.length, anglePer=360/total, radius=120, cx=160, cy=160;
var duration=18000, startTime=performance.now();
var wrap=document.getElementById('orbitWrap'), cardEls=[];

for(var i=0;i<total;i++){
  var d=document.createElement('div'); d.className='ocard';
  if(CARDS[i].img){
    var im=document.createElement('img'); im.className='ocard-img'; im.src=CARDS[i].img;
    im.onerror=function(){this.outerHTML='<div class="ocard-noimg">📦</div>';};
    d.appendChild(im);
  } else {
    var ni=document.createElement('div'); ni.className='ocard-noimg'; ni.textContent='📦';
    d.appendChild(ni);
  }
  var lb=document.createElement('div'); lb.className='ocard-label'; lb.textContent=CARDS[i].cat;
  d.appendChild(lb); wrap.appendChild(d); cardEls.push(d);
}

function animate(now){
  var elapsed=(now-startTime)%duration, baseDeg=(elapsed/duration)*360;
  for(var i=0;i<total;i++){
    var angle=(anglePer*i-baseDeg+3600)%360, rad=angle*Math.PI/180;
    var x=cx+radius*Math.sin(rad)-40, y=cy-radius*Math.cos(rad)-40;
    var isTop=angle<22||angle>338;
    cardEls[i].style.left=x+'px'; cardEls[i].style.top=y+'px';
    cardEls[i].style.transform='scale('+(isTop?1.6:1.0)+')';
    cardEls[i].style.boxShadow=isTop?'0 12px 35px rgba(147,51,234,0.9)':'0 2px 8px rgba(0,0,0,0.3)';
    cardEls[i].style.zIndex=isTop?20:1;
    cardEls[i].style.transition='transform 0.3s,box-shadow 0.3s';
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

function gocat(){
  var btn=document.getElementById('catBtn');
  btn.textContent='⏳ Cargando...'; btn.classList.add('loading');
  document.getElementById('overlay').classList.add('on');
  window.location.href=CAT_URL;
}
</script>
</body>
</html>
